<h1>Update Pet</h1>

<div class="form-container">

  <form [formGroup]="updatePetForm" (ngSubmit)="updatePet()" class="form-card">

    <input type="hidden" formControlName="petId">

    <div class="row">

      <div class="field">
        <label>Name</label>
        <input type="text" formControlName="petName">
      </div>

      <div class="field">
        <label>Type</label>
        <select formControlName="petType">
          <option *ngFor="let type of types" [value]="type.id">
            {{type.name}}
          </option>
        </select>
      </div>

      <div class="field">
        <label>Gender</label>
        <select formControlName="petGender">
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>
      </div>

    </div>

    <div class="row">

      <div class="field">
        <label>Age</label>
        <input type="text" formControlName="petAge">
      </div>

      <div class="field">
        <label>Description</label>
        <textarea formControlName="petDescription"></textarea>
      </div>

      <div class="field">
        <label>Image</label>
        <input type="text" formControlName="petImage">
      </div>

    </div>

    <button type="submit" class="button">
      Update Pet
    </button>

  </form>

</div>
