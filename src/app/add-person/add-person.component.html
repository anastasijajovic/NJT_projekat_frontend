<h1>Add New Person</h1>

<div class="form-container">

  <form [formGroup]="newPersonForm" (ngSubmit)="addPerson()" class="form-card">

    <div class="row">
      <div class="field">
        <label>JMBG</label>
        <input type="text" formControlName="personJmbg">
      </div>

      <div class="field">
        <label>Name</label>
        <input type="text" formControlName="personName">
      </div>

      <div class="field">
        <label>Surname</label>
        <input type="text" formControlName="personSurname">
      </div>
    </div>

    <!-- 🔥 NEW ROW (username + password + year) -->
    <div class="row">

      <div class="field">
        <label>Email</label>
        <input type="text" formControlName="personUsername">
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" formControlName="personPassword">
      </div>

      <div class="field">
        <label>Year of birth</label>
        <input type="text" formControlName="personYear">
      </div>

    </div>

    <div class="row">

      <div class="field">
        <label>Phone number</label>
        <input type="text" formControlName="personPhone">
      </div>

      <div class="field">
        <label>City</label>
        <select formControlName="personCity">
          <option *ngFor="let city of cities" [value]="city.id">
            {{city.name}}
          </option>
        </select>
      </div>

      <div class="field"></div>

    </div>

    <button type="submit" class="button">Add Person</button>

  </form>

</div>
