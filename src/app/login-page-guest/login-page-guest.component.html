<div class="page-background">
  <div class="content-wrapper">
    
    <div class="card form-card">
      <h2>Guest Login</h2>
      
      <form [formGroup]="loginForm" (ngSubmit)="login()">
        
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" formControlName="username" placeholder="Enter username">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" formControlName="password" placeholder="Enter password">
        </div>

        <div class="buttons">
          <button type="submit" class="btn-primary">Login</button>
        </div>

        <div class="register-link">
          You don't have an account? <a routerLink="/register">Register here!</a>
        </div>

      </form>
    </div>

    <div class="card image-card">
      <img src="https://pbs.twimg.com/profile_images/1471176567736971266/3Zixw2Lc_400x400.jpg" alt="animals">
    </div>

  </div>
</div>
