<h1>Add New Pet</h1>

<div class="form-container">

  <form [formGroup]="newPetForm" (ngSubmit)="addPet()" class="form-card">

    <div class="row">

      <div class="field">
        <label>Name</label>
        <input type="text" formControlName="petName">
      </div>

      <div class="field">
        <label>Type</label>
        <select formControlName="petType">
          <option *ngFor="let type of types" [value]="type.id">
            {{type.name}}
          </option>
        </select>
      </div>

      <div class="field">
        <label>Gender</label>
        <select formControlName="petGender">
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select>
      </div>

    </div>

    <div class="row">

      <div class="field">
        <label>Age</label>
        <input type="text" formControlName="petAge">
      </div>

      <div class="field">
        <label>Description</label>
        <textarea formControlName="petDescription"></textarea>
      </div>

      <div class="field">

        <label>Images</label>

        <input
          type="file"
          multiple
          (change)="selectImages($event)"
        >


        <div *ngFor="let img of selectedImages; let i=index">


          <label>

            <input
              type="radio"
              name="primary"
              [checked]="i==primaryImageIndex"
              (change)="setPrimary(i)"
            >

            {{img.name}}

            (Primary)

          </label>


        </div>


      </div>

    </div>

    <button type="submit" class="button">
      Add Pet
    </button>

  </form>

</div>
