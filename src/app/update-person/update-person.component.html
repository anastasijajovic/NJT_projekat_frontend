<h1>Update Person</h1>

<div class="form-container">

  <form [formGroup]="updatePersonForm" (ngSubmit)="updatePerson()" class="form-card">

    <div class="row">

      <div class="field">
        <label>JMBG</label>
        <input type="text" formControlName="personJmbg" readonly>
      </div>

      <div class="field">
        <label>Name</label>
        <input type="text" formControlName="personName">
      </div>

      <div class="field">
        <label>Surname</label>
        <input type="text" formControlName="personSurname">
      </div>

    </div>


    <div class="row">

      <div class="field">
        <label>Username</label>
        <input type="text" formControlName="personUsername">
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" formControlName="personPassword">
      </div>

      <div class="field">
        <label>Year of birth</label>
        <input type="text" formControlName="personYear">
      </div>

    </div>


    <div class="row">

      <div class="field">
        <label>Phone number</label>
        <input type="text" formControlName="personPhone">
      </div>

      <div class="field">
        <label>City</label>
        <select formControlName="personCity">

          <option *ngFor="let city of cities" [value]="city.id">
            {{city.name}}
          </option>

        </select>
      </div>

      <div class="field"></div>

    </div>


    <button type="submit" class="button">
      Update Person
    </button>

  </form>

</div>
